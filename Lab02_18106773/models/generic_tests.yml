version: 2

models:
  - name: fact_movie_test
    description: "Tabela que consolida filmes"
    columns:
      - name: movie_id
        description: "Chave primária"
        tests:
          - not_null

      - name: revenue
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: vote_average
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 10
